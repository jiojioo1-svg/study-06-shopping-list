<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a1a2e;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #6c63ff;
    }

    .input-row button {
      padding: 12px 18px;
      background: #6c63ff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #574fd6;
    }

    .input-row button:active {
      transform: scale(0.97);
    }

    .stats {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 12px;
    }

    .stats span {
      color: #6c63ff;
      font-weight: 600;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 10px;
      transition: background 0.15s;
    }

    li:hover {
      background: #f8f7ff;
    }

    li + li {
      border-top: 1px solid #f0f0f0;
    }

    li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #6c63ff;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d2d2d;
      word-break: break-all;
      transition: color 0.2s, text-decoration 0.2s;
    }

    .item-text.done {
      text-decoration: line-through;
      color: #b0b0b0;
    }

    .delete-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 1.2rem;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.2s, background 0.2s;
    }

    .delete-btn:hover {
      color: #e55353;
      background: #fff0f0;
    }

    .empty {
      text-align: center;
      color: #c0c0c0;
      font-size: 0.95rem;
      padding: 40px 0;
    }

    .clear-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      padding: 10px;
      background: none;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      color: #888;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      border-color: #e55353;
      color: #e55353;
    }

    .loading {
      text-align: center;
      color: #aaa;
      font-size: 0.9rem;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요..." />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="stats" id="stats"></div>

    <ul id="list"></ul>

    <div class="empty" id="empty" style="display:none">아직 아이템이 없어요. 추가해보세요!</div>
    <div class="loading" id="loading">불러오는 중...</div>

    <button class="clear-btn" id="clearBtn" onclick="clearDone()" style="display:none">
      완료된 항목 삭제
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://vrbnokuahqsvejojjrsf.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZyYm5va3VhaHFzdmVqb2pqcnNmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Mzk2NzAsImV4cCI6MjA4ODIxNTY3MH0.LtI4u6D1CUkCkPgelJl7tyn6IKOOGblI_oPgLRqI-UM';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      document.getElementById('loading').style.display = 'none';

      if (error) {
        console.error('로드 오류:', error);
        return;
      }

      items = data || [];
      render();
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const stats = document.getElementById('stats');
      const clearBtn = document.getElementById('clearBtn');

      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        stats.textContent = '';
        clearBtn.style.display = 'none';
        return;
      }

      empty.style.display = 'none';

      const doneCount = items.filter(i => i.done).length;
      stats.innerHTML = `총 <span>${items.length}</span>개 · 완료 <span>${doneCount}</span>개`;
      clearBtn.style.display = doneCount > 0 ? 'block' : 'none';

      items.forEach(item => {
        const li = document.createElement('li');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.done;
        cb.onchange = () => toggleItem(item.id, !item.done);

        const span = document.createElement('span');
        span.className = 'item-text' + (item.done ? ' done' : '');
        span.textContent = item.text;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.innerHTML = '✕';
        del.title = '삭제';
        del.onclick = () => deleteItem(item.id);

        li.appendChild(cb);
        li.appendChild(span);
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;

      const { data, error } = await db
        .from('shopping_items')
        .insert({ text, done: false })
        .select()
        .single();

      if (error) {
        console.error('추가 오류:', error);
        return;
      }

      items.push(data);
      render();
      input.value = '';
      input.focus();
    }

    async function toggleItem(id, done) {
      const { error } = await db
        .from('shopping_items')
        .update({ done })
        .eq('id', id);

      if (error) {
        console.error('수정 오류:', error);
        return;
      }

      const item = items.find(i => i.id === id);
      if (item) item.done = done;
      render();
    }

    async function deleteItem(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        console.error('삭제 오류:', error);
        return;
      }

      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearDone() {
      const doneIds = items.filter(i => i.done).map(i => i.id);
      if (doneIds.length === 0) return;

      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', doneIds);

      if (error) {
        console.error('삭제 오류:', error);
        return;
      }

      items = items.filter(i => !i.done);
      render();
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
